  <title>Tower Defense</title>

<body>
  <div id="container">
    <h1>Tower Defense</h1>

      <span id="hud-lives">❤ 3</span>

    <p id="hint">Left-click: place tower &nbsp;|&nbsp; Right-click: toggle Basic / Sniper</p>
    <div id="status">Loading WASM…</div>
